<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'none';
        img-src {{cspSource}} data:;
        style-src {{cspSource}} 'unsafe-inline';
        font-src {{cspSource}} data:;
        script-src 'nonce-{{nonce}}';
      "
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{cssUri}}" />
    <title>LakeBurner</title>
  </head>
  <body>
    <section class="section">
      <h2 class="section-title">AI Providers</h2>
      <div id="provider-list" class="provider-list"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Tasks</h2>
      <div class="stack">
        <button id="autoRunBtn" class="btn btn-toggle" type="button" aria-pressed="false"
                title="Auto-approve tool/Keep prompts. Replies 'Keep going, I trust your intuitions' when an assistant asks for direction.">
          <span class="btn-label">Auto-Run</span>
          <span class="btn-state" id="autoRunState">OFF</span>
        </button>
        <button id="pressKeepBtn" class="btn" type="button"
                title="Try to press Copilot's Keep button via VS Code commands; falls back to a calibrated OS click if enabled.">
          Press &ldquo;Keep&rdquo;
        </button>
        <button id="pressAllowBtn" class="btn" type="button"
                title="Try to press a chat tool-confirmation button (Allow Once / Allow in this Session); falls back to a calibrated OS click if enabled.">
          Press &ldquo;Allow&rdquo;
        </button>
        <button id="calibrateBtn" class="btnSmall" type="button"
                title="Capture mouse position over Copilot's Keep button for the OS-click fallback.">
          Calibrate Keep Position
        </button>
        <button id="calibrateAllowBtn" class="btnSmall" type="button"
                title="Capture mouse position over the Allow button for the OS-click fallback.">
          Calibrate Allow Position
        </button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Send Initial Prompt</h2>
      <div class="stack">
        <select id="promptTarget" class="select" aria-label="Chat target"></select>
        <textarea id="promptText" class="textarea" rows="4" placeholder="Type the prompt to seed the chat with..."></textarea>
        <div class="row">
          <button id="sendPromptBtn" class="btn" type="button">Send</button>
          <button id="savePromptBtn" class="btnSmall" type="button" title="Save current text as the default prompt.">Save Default</button>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">Affected Chats</h2>
        <button id="clearChatsBtn" class="btnSmall" type="button" title="Clear all tracked chats and the allowlist.">Clear</button>
      </div>
      <p class="section-hint">Chats you've invoked <code>@lakeburner</code> in. Tick a chat to let Auto-Run press Allow / Keep on its behalf.</p>
      <div id="affected-chats" class="affected-chats" aria-live="polite"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">Activity</h2>
        <button id="clearActivityBtn" class="btnSmall" type="button">Clear</button>
      </div>
      <div id="activity-log" class="activity-log" aria-live="polite"></div>
    </section>

    <script nonce="{{nonce}}" src="{{jsUri}}"></script>
  </body>
</html>
